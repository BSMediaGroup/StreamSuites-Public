<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign-In Complete | StreamSuites</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/css/theme-dark.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/public-pages.css" />
  <link rel="stylesheet" href="/css/public-pages-v2.css" />
  <link rel="stylesheet" href="/css/public-login.css" />
</head>
<body class="ss-public-login">
  <div class="public-bg" aria-hidden="true"></div>
  <div class="ss-public-login__surface">
    <main class="ss-public-login__main">
      <section class="ss-panel glass-card ss-public-login__panel">
        <header class="ss-public-login__header">
          <h1 class="ss-public-login__title">
            <img class="ss-public-login__logo" src="/assets/logos/pubcon.webp" alt="StreamSuites logo" />
            <span>Completing Sign-In</span>
          </h1>
          <p class="ss-public-login__subtitle">We are confirming your public session.</p>
        </header>

        <div class="ss-public-login__body">
          <p id="public-auth-complete-status" class="ss-public-login__status">Checking your session...</p>
          <div class="ss-public-login__actions">
            <a id="public-auth-complete-back" class="ss-public-login__action-link" href="/media.html">Back to page</a>
            <a id="public-auth-complete-login" class="ss-public-login__action-link" href="/public-login.html">Continue login</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/public-toast.js" defer></script>
  <script src="/js/public-auth-complete.js" defer></script>
</body>
</html>
