<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamSuites - Rarity Indicator POC</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a21;
      --text: #e0e0e0;
      --accent: #00b4ff;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px;
      line-height: 1.5;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 { text-align: center; margin-bottom: 40px; color: #fff; }
    
    .item-card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s;
    }
    .item-card:hover { border-color: var(--accent); transform: translateY(-4px); }

    /* Rarity Badge Ideas */
    .rarity-badge {
      padding: 6px 16px;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* Idea 1: Colored Background */
    .common { background: #4b5563; color: #d1d5db; }
    .uncommon { background: #22c55e; color: #052e16; }
    .rare { background: #3b82f6; color: white; }
    .epic { background: #a855f7; color: white; }
    .legendary { background: #f59e0b; color: #1f2937; }
    .mythic { background: linear-gradient(90deg, #ec4899, #8b5cf6); color: white; }
    .system { background: #64748b; color: white; }
    .debug { background: #ef4444; color: white; }

    /* Idea 2: Glow + Border */
    .glow-rare { 
      background: transparent; 
      border: 2px solid #3b82f6; 
      box-shadow: 0 0 12px #3b82f6; 
    }

    /* Idea 3: Progress / Tier Bar */
    .tier-bar {
      height: 8px;
      background: #333;
      border-radius: 9999px;
      overflow: hidden;
      width: 180px;
    }
    .tier-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #a855f7);
    }

    .controls {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Inventory Item Rarity Indicators</h1>

    <div class="controls">
      <label for="rarity-select">Select Rarity:</label>
      <select id="rarity-select" style="padding:10px; background:#1a1a21; color:#e0e0e0; border:1px solid #444; border-radius:8px;">
        <option value="common">Common</option>
        <option value="uncommon">Uncommon</option>
        <option value="rare">Rare</option>
        <option value="epic">Epic</option>
        <option value="legendary">Legendary</option>
        <option value="mythic">Mythic</option>
        <option value="system">System</option>
        <option value="debug">Debug</option>
      </select>
    </div>

    <!-- Idea 1: Simple Colored Badge -->
    <div class="item-card">
      <h3>Idea 1 – Colored Badge</h3>
      <div id="badge1" class="rarity-badge common">COMMON</div>
    </div>

    <!-- Idea 2: Badge + Icon -->
    <div class="item-card">
      <h3>Idea 2 – Badge with Icon</h3>
      <div id="badge2" class="rarity-badge common">
        ★ COMMON
      </div>
    </div>

    <!-- Idea 3: Glow Border -->
    <div class="item-card">
      <h3>Idea 3 – Glow Border</h3>
      <div id="badge3" class="rarity-badge glow-rare">RARE</div>
    </div>

    <!-- Idea 4: Tier Progress Bar -->
    <div class="item-card">
      <h3>Idea 4 – Tier Progress Bar</h3>
      <div style="display:flex; align-items:center; gap:16px;">
        <span id="tier-text">RARE</span>
        <div class="tier-bar"><div id="tier-fill" class="tier-fill" style="width:65%"></div></div>
      </div>
    </div>

    <!-- Idea 5: Multiple stacked indicators -->
    <div class="item-card">
      <h3>Idea 5 – Combined Indicators</h3>
      <div id="combo" style="display:flex; gap:12px; align-items:center;">
        <div class="rarity-badge common">COMMON</div>
        <span style="color:#888">→</span>
        <div class="rarity-badge epic">EPIC</div>
      </div>
    </div>
  </div>

  <script>
    const select = document.getElementById('rarity-select');
    
    function updateRarities(value) {
      const upper = value.toUpperCase();
      
      // Idea 1
      const b1 = document.getElementById('badge1');
      b1.textContent = upper;
      b1.className = `rarity-badge ${value}`;
      
      // Idea 2
      const b2 = document.getElementById('badge2');
      b2.textContent = `★ ${upper}`;
      b2.className = `rarity-badge ${value}`;
      
      // Idea 3
      const b3 = document.getElementById('badge3');
      b3.textContent = upper;
      b3.className = `rarity-badge ${value}`;
      if (value === 'rare') b3.classList.add('glow-rare');
      
      // Idea 4
      document.getElementById('tier-text').textContent = upper;
      const widths = {common:30, uncommon:45, rare:65, epic:80, legendary:92, mythic:100, system:50, debug:15};
      document.getElementById('tier-fill').style.width = (widths[value] || 50) + '%';
    }
    
    select.addEventListener('change', (e) => updateRarities(e.target.value));
    // Initial load
    updateRarities('common');
  </script>
</body>
</html>
