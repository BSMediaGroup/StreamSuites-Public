<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamSuites Public Profile</title>
  <meta name="description" content="Standalone public profile on the canonical StreamSuites site." />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/theme-dark.css" />
  <link rel="stylesheet" href="/css/public-shell.css" />
  <link rel="stylesheet" href="/css/status-widget.css" />
  <link rel="stylesheet" href="/assets/css/ss-profile-hovercard.css" />
</head>
<body data-public-page="public-profile-standalone">
  <div id="public-app"></div>
  <footer class="profile-shell-footer" data-profile-shell-footer>
    <div class="profile-footer-left">
      <a class="profile-return-link" href="https://streamsuites.app/community/">
        <span class="profile-return-icon" style="--icon-mask: url('/assets/icons/ui/community.svg')" aria-hidden="true"></span>
        <span>Community Home</span>
      </a>
    </div>
    <div class="profile-footer-center">
      <span class="footer-version-tooltip-container">
        <a class="footer-version profile-footer-version" href="/changelog" aria-describedby="profile-footer-version-tooltip">Loading version...</a>
        <span class="footer-version-tooltip" id="profile-footer-version-tooltip" role="tooltip">
          <span class="footer-version-tooltip-line" data-footer-version-tooltip="version">Loading version...</span>
          <span class="footer-version-tooltip-line" data-footer-version-tooltip="build">Build ...</span>
          <a class="footer-version-tooltip-link" href="/changelog">View changelog</a>
        </span>
      </span>
    </div>
    <div class="profile-footer-right">
      <span class="profile-footer-status-slot" data-status-slot data-status-slot-mode="inline"></span>
    </div>
  </footer>

  <script src="/js/utils/versioning.js" defer></script>
  <script src="/js/public-badge-ui.js" defer></script>
  <script src="/js/public-data-hub.js" defer></script>
  <script src="/js/public-pages-app.js" defer></script>
  <script src="/assets/js/ss-profile-hovercard.js" defer></script>
  <script src="/js/utils/version-stamp.js" defer></script>
  <script src="/js/status-widget.js" defer></script>
</body>
</html>
